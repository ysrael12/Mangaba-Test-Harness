# Example plan for `mth integration --config` / `mth e2e --config`.
# A plan declares the provider × model matrix and shared defaults.
# A .json file with the same structure also works (no PyYAML dependency).

defaults:
  temperature: 0.0
  max_output_tokens: 512
  timeout: 60

providers:
  - name: openai
    api_key_env: OPENAI_API_KEY
    models: [gpt-4o-mini]

  - name: anthropic
    api_key_env: ANTHROPIC_API_KEY
    models: [claude-3-haiku-20240307]

  - name: huggingface
    api_key_env: HF_TOKEN
    models:
      - Qwen/Qwen2.5-7B-Instruct            # tool_calling: True
      - meta-llama/Meta-Llama-3-8B-Instruct # tool_calling: False -> tool tests xfail/skip

  - name: openrouter
    api_key_env: OPENROUTER_API_KEY
    models:
      - [google/gemini-2.5-flash, anthropic/claude-3.5-sonnet]  # list = native fallback

suites: [contract, integration, e2e]
modules: [reasoning, agent, crew]
